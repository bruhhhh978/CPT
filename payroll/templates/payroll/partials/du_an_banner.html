{# partials/du_an_banner.html - Banner hiển thị dự án đang lọc
   Context: du_an_obj, start_date, view_type #}
<div style="background:var(--primary)11; border:1px solid var(--primary)44; border-radius:10px;
            padding:10px 16px; margin-bottom:4px; display:flex; align-items:center; gap:8px;">
    <i class="fas fa-hard-hat" style="color:var(--primary);"></i>
    <span style="font-weight:600; color:var(--primary);">Dự án:</span>
    <span>{{ du_an_obj.ten_cong_trinh }}</span>
    <a href="{% url 'payroll:payroll_statistics' %}?date={{ start_date|date:'Y-m-d' }}&view_type={{ view_type }}"
       style="margin-left:auto; font-size:0.8rem; color:var(--text-muted);">
        Xem tất cả dự án
    </a>
</div>
