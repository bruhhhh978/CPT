{# partials/modal_add_worker.html - Modal thêm nhân viên #}
{% if can_edit %}
<div id="add-worker-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Thêm Người Làm Công</h2>
            <button onclick="document.getElementById('add-worker-modal').style.display='none'" class="btn btn-close">&times;</button>
        </div>
        <form action="{% url 'payroll:add_employee' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="du_an_id" value="{{ du_an_id }}">
            <input type="hidden" name="current_date" value="{{ target_date|date:'Y-m-d' }}">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" name="name" required class="form-input">
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" name="date_of_birth" class="form-input">
            </div>
            <div class="form-group">
                <label>Nghề / Chức vụ</label>
                <select name="position" class="form-input">
                    <option value="Tho">Thợ</option>
                    <option value="Phu">Phụ</option>
                    <option value="Cai">Cai</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lương ngày (VNĐ)</label>
                <input type="number" name="daily_wage" required class="form-input" placeholder="Ví dụ: 400000">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">TẠO NGƯỜI LÀM</button>
        </form>
    </div>
</div>
{% endif %}
