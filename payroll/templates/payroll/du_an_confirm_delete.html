{% extends 'payroll/base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 100px auto;" class="card">
    <div style="text-align: center; padding: 20px;">
        <div style="width: 70px; height: 70px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 2rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 style="margin-bottom: 10px;">Xác nhận xóa dự án?</h2>
        <p style="color: var(--text-muted); line-height: 1.5;">
            Bạn có chắc chắn muốn xóa dự án <strong>"{{ du_an.ten_cong_trinh }}"</strong>? <br>
            Hành động này không thể hoàn tác.
        </p>
        
        <form method="POST" style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger" style="padding: 10px 25px;">
                Xác nhận xóa
            </button>
            <a href="{% url 'payroll:du_an_list' %}" class="btn btn-outline" style="padding: 10px 25px;">Hủy bỏ</a>
        </form>
    </div>
</div>
{% endblock %}
