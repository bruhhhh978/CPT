{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hệ thống Tính công - Công ty Xây dựng{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>Công Ty TNHH Xây Dựng CPT</h1>
            </div>
            <nav class="nav-links">
                <!--  -->
                <a href="/admin/">Quản trị (Admin)</a>
            </nav>
        </header>

        <h2 style="text-align: center; text-transform: uppercase; margin: 1.5rem 0; font-weight: 900; letter-spacing: 0.2em; color: white; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); font-size: 2.5rem;">
            BẢNG CHẤM VÀ TÍNH LƯƠNG
        </h2>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
