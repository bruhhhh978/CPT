{% extends 'payroll/base.html' %}

{% block content %}
<style>
.form-container { max-width: 800px; margin: 0 auto 3rem auto; }
.form-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
.form-header { padding: 20px 30px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
.form-body { padding: 30px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 0.9rem; }
.form-control { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; transition: all 0.2s; background: #fff; box-sizing: border-box; }
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
textarea.form-control { min-height: 120px; resize: vertical; }
.errorlist { color: #ef4444; list-style: none; padding: 0; font-size: 0.85rem; margin-top: 6px; font-weight: 500; }
.btn-row { display: flex; gap: 15px; margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--border); }
</style>

<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2>{{ title }}</h2>
            <a href="{% url 'payroll:du_an_list' %}" style="color:var(--text-muted); font-size:1.2rem;">
                <i class="fas fa-times"></i>
            </a>
        </div>
        <div class="form-body">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}{{ field.errors }}{% endif %}
                </div>
                {% endfor %}
                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Lưu dự án
                    </button>
                    <a href="{% url 'payroll:du_an_list' %}" class="btn btn-outline">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
